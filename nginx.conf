# SecureLink — Nginx Reverse Proxy Configuration
#
# Usage:
#   1. Replace 'yourdomain.com' with your actual domain
#   2. Obtain SSL certificates (certbot --nginx -d yourdomain.com)
#   3. Copy to /etc/nginx/sites-available/securelink
#   4. ln -s /etc/nginx/sites-available/securelink /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx
#
# Assumes the app is running on localhost:5000 (default docker-compose port binding)

# Rate limiting zones (adjust limits as needed)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (filled in by certbot, or set manually)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Max upload size (for file scanning if enabled)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Static files — served directly by Nginx for performance
    location /static/ {
        alias /path/to/securelink/static/;   # update this path
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Auth endpoints — tighter rate limit
    location ~ ^/api/(login|register|extension/auth) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # API endpoints — standard rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # Stripe webhooks — no rate limiting (Stripe has its own retry logic)
    location /api/webhooks/ {
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # Everything else — proxy to Flask
    location / {
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }
}
