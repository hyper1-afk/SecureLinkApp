<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400, initial-scale=1.0">
    <title>SecureLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 300px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            color: white;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .main {
            padding: 16px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            padding-right: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 14px;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .verify-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .verify-btn:hover {
            opacity: 0.9;
        }

        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            display: none;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .result.safe {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .result.danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .result.warning {
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .result.safe .result-icon {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .result.danger .result-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .result.warning .result-icon {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }

        .result-title {
            font-size: 18px;
            font-weight: 600;
        }

        .result-subtitle {
            font-size: 13px;
            opacity: 0.7;
        }

        .risk-meter {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .risk-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .result.safe .risk-fill {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        .result.warning .risk-fill {
            background: linear-gradient(90deg, #eab308, #ca8a04);
        }

        .result.danger .risk-fill {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        .threat-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .threat-tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .ai-explanation {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .quick-action {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .quick-action-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .quick-action-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
        }

        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recent-checks {
            margin-top: 16px;
        }

        .recent-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .recent-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .recent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .recent-status.safe { background: #22c55e; }
        .recent-status.danger { background: #ef4444; }
        .recent-status.warning { background: #eab308; }

        .recent-url {
            flex: 1;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recent-score {
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            SecureLink
        </div>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <div class="main">
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Paste a URL to check...">
            <button class="verify-btn" id="verifyBtn">Verify</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing link safety...</p>
        </div>

        <div class="result" id="result">
            <div class="result-header">
                <div class="result-icon" id="resultIcon">✓</div>
                <div>
                    <div class="result-title" id="resultTitle">Safe</div>
                    <div class="result-subtitle" id="resultSubtitle">This link appears to be safe</div>
                </div>
            </div>
            <div class="risk-meter">
                <div class="risk-fill" id="riskFill" style="width: 0%"></div>
            </div>
            <div id="riskScore" style="font-size: 12px; opacity: 0.7;">Risk Score: 0/100</div>
            <div class="threat-tags" id="threatTags"></div>
            <div class="ai-explanation" id="aiExplanation" style="display: none;"></div>
        </div>

        <div class="quick-actions">
            <div class="quick-action" id="checkCurrentPage">
                <div class="quick-action-icon">🔍</div>
                <div class="quick-action-label">Check This Page</div>
            </div>
            <div class="quick-action" id="scanPageLinks">
                <div class="quick-action-icon">📋</div>
                <div class="quick-action-label">Scan Page Links</div>
            </div>
            <div class="quick-action" id="reportLink">
                <div class="quick-action-icon">🚩</div>
                <div class="quick-action-label">Report Link</div>
            </div>
            <div class="quick-action" id="breachChecker">
                <div class="quick-action-icon">🔐</div>
                <div class="quick-action-label">Breach Check</div>
            </div>
        </div>

        <div class="recent-checks" id="recentChecks">
            <div class="recent-title">Recent Checks</div>
            <div id="recentList"></div>
        </div>
    </div>

    <div class="footer">
        Powered by <a href="https://securelink.com" target="_blank">SecureLink</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
