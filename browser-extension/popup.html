<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, initial-scale=1.0">
    <title>SecureLink</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <img src="icons/icon32.png" alt="SecureLink">
            <span>SecureLink</span>
        </div>
        <span class="tier-badge" id="tier-badge">Free</span>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Protection Active</span>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" id="checked-count">0</div>
            <div class="stat-label">Scanned</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-card">
            <div class="stat-value danger" id="blocked-count">0</div>
            <div class="stat-label">Blocked</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-card">
            <div class="stat-value safe" id="safe-count">0</div>
            <div class="stat-label">Safe</div>
        </div>
    </div>

    <!-- Manual URL Check -->
    <div class="check-section">
        <div class="section-label">Check a URL</div>
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Paste any URL to scan..." autocomplete="off" spellcheck="false">
            <button class="check-btn" id="check-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                Scan
            </button>
        </div>
        <div class="result hidden" id="result">
            <div class="result-badge" id="result-badge">
                <span id="result-icon"></span>
                <span id="result-text"></span>
            </div>
            <div class="result-score" id="result-score"></div>
            <div class="result-threats" id="result-threats"></div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Account Section -->
    <!-- Login (logged out) -->
    <div class="account-section" id="login-section">
        <div class="account-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Sign in to your account
        </div>
        <input type="email" id="login-email" placeholder="Email address" autocomplete="email">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <button class="login-btn" id="login-btn">Sign In</button>
        <div class="login-error hidden" id="login-error"></div>
        <div class="login-links">
            <a href="https://securelinkapp.com/login?tab=register" target="_blank">Create free account</a>
            <span>·</span>
            <a href="https://securelinkapp.com/pricing" target="_blank">View plans</a>
        </div>
    </div>

    <!-- User (logged in) -->
    <div class="account-section hidden" id="user-section">
        <div class="user-row">
            <div class="user-avatar" id="user-avatar">U</div>
            <div class="user-info">
                <div class="user-email" id="user-email">user@example.com</div>
                <div class="user-plan" id="user-plan">Free plan · Unlimited scans</div>
            </div>
            <button class="logout-btn" id="logout-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="https://securelinkapp.com" target="_blank">securelinkapp.com</a>
        <span>v1.2.0</span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
