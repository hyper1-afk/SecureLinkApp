<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b36"/>
      <stop offset="100%" style="stop-color:#091428"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05">
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#38bdf8" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#38bdf8" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="#38bdf8" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="800" stroke="#a78bfa" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="800" stroke="#a78bfa" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="800" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="220" cy="400" r="320" fill="#0ea5e9" opacity="0.04"/>
  <circle cx="1060" cy="400" r="320" fill="#8b5cf6" opacity="0.05"/>

  <!-- ══════════════════════════════════
       LEFT COLUMN  x:80–560  centered y
       ══════════════════════════════════ -->

  <!-- Icon + Wordmark -->
  <g transform="translate(80, 100)">
    <path d="M50 6 L86 20 L86 50 C86 70 72 82 50 90 C28 82 14 70 14 50 L14 20 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
    <path d="M50 6 L86 20 L86 50 C86 70 72 82 50 90 C28 82 14 70 14 50 L14 20 Z"
          fill="url(#accent)" opacity="0.06"/>
    <path d="M60 32 C60 27 56 24 50 24 C44 24 40 27 40 32 C40 37 44 39.5 50 40.5 C56 41.5 60 44.5 60 50 C60 55.5 56 58.5 50 58.5 C44 58.5 40 55.5 40 50"
          fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" filter="url(#softglow)"/>
    <circle cx="78" cy="78" r="14" fill="#060d1f"/>
    <circle cx="78" cy="78" r="14" fill="url(#accent)" opacity="0.2"/>
    <circle cx="78" cy="78" r="13" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <polyline points="73,78 77,82 84,74" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="196" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">SecureLink</text>

  <!-- Headline -->
  <text x="80" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="800" fill="white" letter-spacing="-2">Scan every link.</text>
  <text x="80" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#accent)">Stay protected.</tspan>
  </text>

  <!-- Sub copy -->
  <text x="80" y="420" font-family="sans-serif" font-size="22" fill="#64748b">Automatic URL scanning. Real-time threat detection.</text>
  <text x="80" y="452" font-family="sans-serif" font-size="22" fill="#64748b">Free for everyone.</text>

  <!-- Feature pills -->
  <rect x="80"  y="490" width="186" height="44" rx="22" fill="url(#accent)" opacity="0.1"/>
  <rect x="80"  y="490" width="186" height="44" rx="22" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <text x="173" y="517" font-family="sans-serif" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">⚡ Auto URL Scanning</text>

  <rect x="278" y="490" width="164" height="44" rx="22" fill="url(#accent)" opacity="0.1"/>
  <rect x="278" y="490" width="164" height="44" rx="22" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <text x="360" y="517" font-family="sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">🛡 Phishing Blocker</text>

  <rect x="454" y="490" width="160" height="44" rx="22" fill="url(#accent)" opacity="0.1"/>
  <rect x="454" y="490" width="160" height="44" rx="22" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <text x="534" y="517" font-family="sans-serif" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">🔍 Right-Click Scan</text>

  <!-- URL -->
  <text x="80" y="680" font-family="sans-serif" font-size="18" fill="#334155">securelinkapp.com</text>

  <!-- ══════════════════════════════════
       RIGHT COLUMN  x:740–1200
       ══════════════════════════════════ -->

  <!-- Threat pill floating above popup -->
  <g transform="translate(856, 60)" filter="url(#cardshadow)">
    <rect x="0" y="0" width="228" height="52" rx="26" fill="#130808" stroke="rgba(239,68,68,0.5)" stroke-width="1.5"/>
    <text x="26" y="34" font-family="sans-serif" font-size="20">🚨</text>
    <text x="56" y="24" font-family="sans-serif" font-size="13" font-weight="700" fill="#f87171">Threat Blocked</text>
    <text x="56" y="41" font-family="sans-serif" font-size="11" fill="#64748b">Risk score: 94/100</text>
  </g>

  <!-- Popup card -->
  <g transform="translate(740, 120)" filter="url(#cardshadow)">
    <rect x="0" y="0" width="420" height="594" rx="20" fill="url(#cardBg)"/>
    <rect x="0" y="0" width="420" height="594" rx="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="420" height="64" rx="20" fill="#091428"/>
    <rect x="0" y="44" width="420" height="20" fill="#091428"/>
    <!-- Logo icon -->
    <rect x="18" y="16" width="32" height="32" rx="8" fill="url(#accent)" opacity="0.15"/>
    <text x="34" y="37" font-family="sans-serif" font-size="14" font-weight="800" fill="url(#accent)" text-anchor="middle">S</text>
    <text x="60" y="37" font-family="sans-serif" font-size="16" font-weight="700" fill="white">SecureLink</text>
    <!-- FREE badge -->
    <rect x="338" y="20" width="62" height="26" rx="13" fill="rgba(255,255,255,0.06)"/>
    <text x="369" y="37" font-family="sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="0.5">FREE</text>

    <!-- Status bar -->
    <rect x="0" y="64" width="420" height="42" fill="rgba(16,185,129,0.07)"/>
    <circle cx="22" cy="85" r="6" fill="#10b981"/>
    <circle cx="22" cy="85" r="6" fill="#10b981" opacity="0.4" filter="url(#softglow)"/>
    <text x="36" y="90" font-family="sans-serif" font-size="13" font-weight="600" fill="#10b981">Protection Active</text>

    <!-- Stats row -->
    <rect x="0" y="106" width="420" height="78" fill="rgba(0,0,0,0.2)"/>
    <!-- Scanned -->
    <text x="70"  y="132" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">🔍</text>
    <text x="70"  y="158" font-family="sans-serif" font-size="24" font-weight="700" fill="#38bdf8" text-anchor="middle">142</text>
    <text x="70"  y="174" font-family="sans-serif" font-size="9"  fill="#475569" text-anchor="middle" letter-spacing="1">SCANNED</text>
    <line x1="140" y1="118" x2="140" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Blocked -->
    <text x="210" y="132" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">🚫</text>
    <text x="210" y="158" font-family="sans-serif" font-size="24" font-weight="700" fill="#ef4444" text-anchor="middle">3</text>
    <text x="210" y="174" font-family="sans-serif" font-size="9"  fill="#475569" text-anchor="middle" letter-spacing="1">BLOCKED</text>
    <line x1="280" y1="118" x2="280" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Safe -->
    <text x="350" y="132" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">✅</text>
    <text x="350" y="158" font-family="sans-serif" font-size="24" font-weight="700" fill="#10b981" text-anchor="middle">139</text>
    <text x="350" y="174" font-family="sans-serif" font-size="9"  fill="#475569" text-anchor="middle" letter-spacing="1">SAFE</text>

    <!-- URL input -->
    <rect x="18" y="202" width="384" height="46" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
    <text x="32" y="230" font-family="sans-serif" font-size="12" fill="#334155">Paste or right-click any URL to scan...</text>
    <rect x="316" y="208" width="76" height="34" rx="9" fill="url(#accent)"/>
    <text x="354" y="229" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Scan</text>

    <!-- Result card — Safe -->
    <rect x="18" y="264" width="384" height="84" rx="12" fill="rgba(16,185,129,0.09)" stroke="rgba(16,185,129,0.22)" stroke-width="1"/>
    <text x="42"  y="314" font-family="sans-serif" font-size="32">✅</text>
    <text x="84"  y="300" font-family="sans-serif" font-size="16" font-weight="700" fill="#f8fafc">Safe</text>
    <text x="84"  y="320" font-family="sans-serif" font-size="12" fill="#64748b">Risk score: 4/100</text>
    <rect x="270" y="285" width="112" height="22" rx="11" fill="rgba(16,185,129,0.15)"/>
    <text x="326" y="300" font-family="sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="600">No threats found</text>

    <!-- Divider -->
    <line x1="18" y1="370" x2="402" y2="370" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Account section label -->
    <text x="18" y="398" font-family="sans-serif" font-size="10" font-weight="600" fill="#334155" letter-spacing="1.2">ACCOUNT</text>

    <!-- Email input -->
    <rect x="18" y="410" width="384" height="46" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="32" y="438" font-family="sans-serif" font-size="13" fill="#334155">Email address</text>

    <!-- Password input -->
    <rect x="18" y="466" width="384" height="46" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="32" y="494" font-family="sans-serif" font-size="13" fill="#334155">Password</text>

    <!-- Sign in button -->
    <rect x="18" y="524" width="384" height="46" rx="11" fill="url(#accent)"/>
    <text x="210" y="552" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Sign In</text>

    <!-- Footer -->
    <text x="140" y="584" font-family="sans-serif" font-size="11" fill="#1e293b">securelinkapp.com</text>
    <text x="356" y="584" font-family="sans-serif" font-size="10" fill="#1e293b">v1.3.0</text>
  </g>

</svg>
