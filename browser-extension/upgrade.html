<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureLink - Upgrade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .message {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .plans {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .plan {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            width: 250px;
            transition: all 0.3s;
        }

        .plan:hover {
            border-color: #0ea5e9;
            transform: translateY(-5px);
        }

        .plan.popular {
            border-color: #f5af19;
            background: rgba(245, 175, 25, 0.1);
        }

        .plan-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .plan-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .plan-price {
            font-size: 36px;
            font-weight: bold;
            color: #0ea5e9;
        }

        .plan-price span {
            font-size: 14px;
            color: #64748b;
            font-weight: normal;
        }

        .plan-feature {
            margin-top: 15px;
            font-size: 16px;
            color: #94a3b8;
        }

        .plan-feature strong {
            color: white;
        }

        .plan-btn {
            display: inline-block;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .plan-btn:hover {
            opacity: 0.9;
        }

        .plan.popular .plan-btn {
            background: linear-gradient(135deg, #f5af19, #f12711);
        }

        .close-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-btn:hover {
            border-color: #64748b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏳</div>
        <h1>Daily Scan Limit Reached</h1>
        <p class="message" id="message">You've used all your free scans for today. Upgrade to continue protecting yourself online.</p>

        <div class="plans">
            <div class="plan popular">
                <span class="plan-badge">Most Popular</span>
                <div class="plan-name">Pro</div>
                <div class="plan-price">$9.99 <span>/month</span></div>
                <div class="plan-feature"><strong>500</strong> scans per day</div>
                <a href="https://securelinkapp.com/pricing" target="_blank" class="plan-btn">Upgrade to Pro</a>
            </div>

            <div class="plan">
                <div class="plan-name">Enterprise</div>
                <div class="plan-price">$49.99 <span>/month</span></div>
                <div class="plan-feature"><strong>Unlimited</strong> scans</div>
                <a href="https://securelinkapp.com/pricing" target="_blank" class="plan-btn">Go Enterprise</a>
            </div>
        </div>

        <button class="close-btn" id="closeBtn">Close This Tab</button>
    </div>

    <script src="upgrade.js"></script>
</body>
</html>
