<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SecureLink Store Assets Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030712; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px; }
    h2 { color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
    .section { margin-bottom: 60px; }
    .label { color: #475569; font-size: 12px; margin-top: 10px; }
    img { display: block; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }

    /* Scale down 1280x800 to fit screen */
    .banner-wrap { width: 100%; max-width: 1280px; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
    .banner-wrap img { width: 100%; height: auto; border-radius: 0; border: none; }

    .tile-wrap { display: inline-block; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }

    .icons-row { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
    .icon-item { text-align: center; }
    .icon-item .label { margin-top: 8px; }
  </style>
</head>
<body>

  <div class="section">
    <h2>1280x800 — Main Promotional Banner</h2>
    <div class="banner-wrap">
      <img src="store-promo-1280x800.svg" alt="1280x800 promo">
    </div>
    <p class="label">Used on the main Chrome Web Store listing page</p>
  </div>

  <div class="section">
    <h2>440x280 — Search Result Tile</h2>
    <div class="tile-wrap">
      <img src="store-promo-440x280.svg" width="440" height="280" alt="440x280 tile">
    </div>
    <p class="label">Shown in Chrome Web Store search results</p>
  </div>

  <div class="section">
    <h2>Icon — All Sizes</h2>
    <div class="icons-row">
      <div class="icon-item">
        <img src="icons/icon-master.svg" width="128" height="128" alt="128">
        <p class="label">128x128</p>
      </div>
      <div class="icon-item">
        <img src="icons/icon-master.svg" width="48" height="48" alt="48">
        <p class="label">48x48</p>
      </div>
      <div class="icon-item">
        <img src="icons/icon-master.svg" width="32" height="32" alt="32">
        <p class="label">32x32</p>
      </div>
      <div class="icon-item">
        <img src="icons/icon-master.svg" width="16" height="16" alt="16">
        <p class="label">16x16</p>
      </div>
    </div>
  </div>

</body>
</html>
