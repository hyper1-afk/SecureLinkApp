<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ Security Warning - SecureLink</title>
    <link rel="stylesheet" href="warning.css">
</head>
<body>
    <div class="warning-container">
        <div class="warning-icon">🛡️</div>
        <h1>Potentially Dangerous Site Detected</h1>
        <p class="subtitle">SecureLink has blocked this page for your safety</p>
        
        <div class="url-display" id="blocked-url"></div>
        
        <div class="risk-score" id="risk-score">Risk Score: --/100</div>
        
        <div class="threats" id="threats-container">
            <h3>⚠️ Detected Threats:</h3>
            <div id="threats-list"></div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-safe" id="btn-back">← Go Back to Safety</button>
            <button class="btn btn-danger" id="btn-proceed">Proceed Anyway (Not Recommended)</button>
        </div>
        
        <p class="powered-by">Protected by <a href="https://securelinkapp.com" target="_blank">SecureLink</a></p>
    </div>

    <script src="warning.js"></script>
</body>
</html>
