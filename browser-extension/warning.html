<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Warning - SecureLink</title>
    <link rel="stylesheet" href="warning.css">
</head>
<body>
    <div class="card" id="card">
        <div class="card-accent" id="card-accent"></div>
        <div class="card-header">
            <div class="brand">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                SecureLink
            </div>
            <div class="risk-badge" id="risk-badge">HIGH RISK</div>
        </div>

        <div class="card-body">
            <div class="flag-icon" id="flag-icon"></div>
            <h1 id="heading">This site is dangerous</h1>
            <p class="subtitle" id="subtitle">Do not enter any personal information on this page.</p>
            <div class="url-box" id="blocked-url"></div>

            <div class="findings" id="findings-container">
                <div id="threats-list"></div>
            </div>
        </div>

        <div class="card-footer">
            <button class="btn btn-back" id="btn-back">← Go back</button>
            <button class="btn btn-proceed" id="btn-proceed">Continue anyway</button>
        </div>

        <p class="score-line" id="score-line"></p>
    </div>

    <script src="warning.js"></script>
</body>
</html>
