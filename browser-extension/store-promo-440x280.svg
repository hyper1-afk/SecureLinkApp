<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="70" x2="440" y2="70" stroke="#38bdf8" stroke-width="1"/>
    <line x1="0" y1="140" x2="440" y2="140" stroke="#38bdf8" stroke-width="1"/>
    <line x1="0" y1="210" x2="440" y2="210" stroke="#38bdf8" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="280" stroke="#a78bfa" stroke-width="1"/>
    <line x1="220" y1="0" x2="220" y2="280" stroke="#a78bfa" stroke-width="1"/>
    <line x1="330" y1="0" x2="330" y2="280" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="60" cy="140" r="120" fill="#0ea5e9" opacity="0.04"/>
  <circle cx="390" cy="140" r="120" fill="#8b5cf6" opacity="0.05"/>

  <!-- ── LEFT COLUMN (x: 28 to 240) ── -->

  <!-- Icon + wordmark row -->
  <g transform="translate(28, 28)">
    <!-- Shield -->
    <path d="M26 4 L44 11 L44 25 C44 35 37 41 26 45 C15 41 8 35 8 25 L8 11 Z"
          fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
    <path d="M26 4 L44 11 L44 25 C44 35 37 41 26 45 C15 41 8 35 8 25 L8 11 Z"
          fill="url(#accent)" opacity="0.06"/>
    <!-- S -->
    <path d="M31 16 C31 13.5 29 12 26 12 C23 12 21 13.5 21 16 C21 18.5 23 19.5 26 20 C29 20.5 31 22 31 24.5 C31 27 29 28.5 26 28.5 C23 28.5 21 27 21 24.5"
          fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Check badge -->
    <circle cx="40" cy="40" r="8" fill="#060d1f"/>
    <circle cx="40" cy="40" r="8" fill="url(#accent)" opacity="0.2"/>
    <circle cx="40" cy="40" r="7.5" fill="none" stroke="url(#accent)" stroke-width="1.2"/>
    <polyline points="36.5,40 39,42.5 43.5,37" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="82" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" fill="white" letter-spacing="-0.3">SecureLink</text>

  <!-- Headline -->
  <text x="28" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="800" fill="white" letter-spacing="-1">Scan every link.</text>
  <text x="28" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="800" letter-spacing="-1">
    <tspan fill="url(#accent)">Stay protected.</tspan>
  </text>

  <!-- Subtext -->
  <text x="28" y="174" font-family="sans-serif" font-size="12" fill="#64748b">Real-time scanning · Phishing blocker · Free</text>

  <!-- Feature pills -->
  <rect x="28" y="192" width="138" height="30" rx="15" fill="url(#accent)" opacity="0.1"/>
  <rect x="28" y="192" width="138" height="30" rx="15" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.35"/>
  <text x="97" y="211" font-family="sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">⚡ Auto Scanning</text>

  <rect x="174" y="192" width="122" height="30" rx="15" fill="url(#accent)" opacity="0.1"/>
  <rect x="174" y="192" width="122" height="30" rx="15" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.35"/>
  <text x="235" y="211" font-family="sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">🛡 Blocks Threats</text>

  <!-- URL -->
  <text x="28" y="255" font-family="sans-serif" font-size="12" fill="#334155">securelinkapp.com</text>

  <!-- ── RIGHT COLUMN (x: 310 to 418) ── -->

  <!-- Threat card -->
  <g transform="translate(308, 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="112" height="72" rx="12" fill="#130a0a" stroke="rgba(239,68,68,0.4)" stroke-width="1.2"/>
    <text x="56" y="26" font-family="sans-serif" font-size="20" text-anchor="middle">🚨</text>
    <text x="56" y="46" font-family="sans-serif" font-size="11" font-weight="700" fill="#f87171" text-anchor="middle">Threat Blocked</text>
    <text x="56" y="61" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Risk: 94/100</text>
  </g>

  <!-- Safe card -->
  <g transform="translate(308, 148)" filter="url(#shadow)">
    <rect x="0" y="0" width="112" height="72" rx="12" fill="#060f0a" stroke="rgba(16,185,129,0.4)" stroke-width="1.2"/>
    <text x="56" y="26" font-family="sans-serif" font-size="20" text-anchor="middle">✅</text>
    <text x="56" y="46" font-family="sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle">Link is Safe</text>
    <text x="56" y="61" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Risk: 2/100</text>
  </g>

</svg>
