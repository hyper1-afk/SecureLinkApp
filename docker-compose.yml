# SecureLinkApp - Docker Compose Configuration
# Run with: docker-compose up -d

name: securelink

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: securelink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-securelink}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-securelink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securelink-internal

  # ── Ollama (LLM runtime for Hermes agents) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: securelink-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - securelink-internal
    # Pull hermes3 on first start (no-op if already pulled)
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull hermes3 && wait"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ── Flask Web Application ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securelink-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-5000}:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-securelink}
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - agent_workspace:/app/agents/workspace   # shared with agents container
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securelink-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Hermes Agent Scheduler (24/7 autonomous agents) ──────────────────────
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securelink-agents
    restart: unless-stopped
    command: ["python", "agents/run_scheduler.py"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-securelink}
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - agent_workspace:/app/agents/workspace   # shared with web container
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - securelink-internal

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  agent_workspace:
    driver: local

networks:
  securelink-internal:
    driver: bridge
