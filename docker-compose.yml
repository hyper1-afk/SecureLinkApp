# SecureLinkApp - Docker Compose Configuration
# Run with: docker-compose up -d

name: securelink

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: securelink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-securelink}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securelink} -d ${POSTGRES_DB:-securelink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securelink-network

  # SecureLinkApp Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securelink-web
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Required
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-securelink}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-securelink}
      APP_URL: ${APP_URL:-http://localhost:5000}
      
      # Flask
      FLASK_ENV: ${FLASK_ENV:-production}
      DEBUG: ${DEBUG:-false}
      
      # Stripe (required for payments)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      
      # Google OAuth (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      
      # API Keys (optional - for enhanced scanning)
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      GOOGLE_SAFE_BROWSING_API_KEY: ${GOOGLE_SAFE_BROWSING_API_KEY:-}
      
      # SMTP for emails (optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securelink-network

  # Optional: Nginx reverse proxy for production
  # Uncomment if you want to use Nginx
  # nginx:
  #   image: nginx:alpine
  #   container_name: securelink-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - web
  #   networks:
  #     - securelink-network

volumes:
  postgres_data:
    driver: local

networks:
  securelink-network:
    driver: bridge
