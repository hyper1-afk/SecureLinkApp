<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Tickets — SecureLink Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-inner">
                <div class="sidebar-brand-icon"><img src="/static/icons/icon128.png" alt="SecureLink" style="width:32px;height:32px;display:block;border-radius:8px;"></div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-brand-name">SecureLink</span>
                    <span class="sidebar-brand-sub">Admin</span>
                </div>
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">Overview</div>
            <a href="/admin/dashboard" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">Support</div>
            <a href="/admin/tickets" class="nav-link" id="navAllTickets">
                <i class="bi bi-ticket-detailed-fill"></i> All Tickets
            </a>
            <a href="/admin/tickets?status=open" class="nav-link" id="navOpenTickets">
                <i class="bi bi-inbox-fill"></i> Open
            </a>
            <a href="/admin/tickets?status=in_progress" class="nav-link" id="navInProgress">
                <i class="bi bi-clock-history"></i> In Progress
            </a>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">Management</div>
            <a href="/admin/customers" class="nav-link"><i class="bi bi-people-fill"></i> Customers</a>
            <a href="/admin/employees" class="nav-link"><i class="bi bi-person-badge-fill"></i> Employees</a>
            <a href="/admin/licenses" class="nav-link"><i class="bi bi-key-fill"></i> Licenses</a>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">System</div>
            <a href="/admin/database" class="nav-link"><i class="bi bi-database-fill"></i> Database</a>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="mobile-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="page-title">Support Tickets</h1>
            </div>
            <div class="topbar-right">
                <span class="topbar-time" id="currentTime"></span>
                <div class="user-pill">
                    <div class="user-pill-avatar" id="employeeAvatar">?</div>
                    <div class="user-pill-info">
                        <div class="user-pill-name" id="employeeName">Loading…</div>
                        <div class="user-pill-role" id="employeeRole">—</div>
                    </div>
                </div>
                <button class="topbar-signout" onclick="logout()" title="Sign Out">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <select class="form-select" id="filterStatus">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="waiting_customer">Waiting Customer</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
            </select>
            <select class="form-select" id="filterPriority">
                <option value="">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
            </select>
            <select class="form-select" id="filterCategory">
                <option value="">All Categories</option>
                <option value="general">General</option>
                <option value="billing">Billing</option>
                <option value="technical">Technical</option>
                <option value="account">Account</option>
                <option value="feature_request">Feature Request</option>
                <option value="bug_report">Bug Report</option>
                <option value="complaint">Complaint</option>
            </select>
            <input type="text" class="form-control" id="filterSearch" placeholder="Search tickets…">
            <button class="btn btn-primary" onclick="loadTickets()">
                <i class="bi bi-search"></i> Search
            </button>
        </div>

        <!-- Tickets Table -->
        <div class="panel">
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Customer</th>
                            <th>Subject</th>
                            <th>Category</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Assigned To</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="ticketsBody">
                        <tr>
                            <td colspan="8">
                                <div class="empty-state">
                                    <i class="bi bi-arrow-repeat"></i>
                                    <p>Loading tickets…</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div id="paginationNav" style="display:none;">
            <div class="pagi" id="pagination"></div>
        </div>
    </main>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <script>
        let currentPage = 1;
        const perPage   = 20;

        function getAdminToken()  { return localStorage.getItem('admin_token'); }
        function getAuthHeaders() { return { 'Authorization': `Bearer ${getAdminToken()}` }; }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const open = sidebar.classList.toggle('open');
            overlay.classList.toggle('active', open);
        }

        function updateClock() {
            const el = document.getElementById('currentTime');
            if (el) el.textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }
        updateClock(); setInterval(updateClock, 30000);

        function updateNavHighlight() {
            const status = new URLSearchParams(window.location.search).get('status');
            document.getElementById('navAllTickets').classList.remove('active');
            document.getElementById('navOpenTickets').classList.remove('active');
            document.getElementById('navInProgress').classList.remove('active');
            if (status === 'open')        document.getElementById('navOpenTickets').classList.add('active');
            else if (status === 'in_progress') document.getElementById('navInProgress').classList.add('active');
            else                          document.getElementById('navAllTickets').classList.add('active');
        }
        updateNavHighlight();

        async function checkAuth() {
            const token = getAdminToken();
            if (!token) { window.location.href = '/admin/login'; return; }
            try {
                const res  = await fetch('/admin/api/validate', { headers: getAuthHeaders() });
                if (!res.ok) { localStorage.removeItem('admin_token'); window.location.href = '/admin/login'; return; }
                const data = await res.json();
                if (data.valid && data.employee) {
                    document.getElementById('employeeName').textContent = data.employee.full_name;
                    document.getElementById('employeeRole').textContent =
                        data.employee.role.charAt(0).toUpperCase() + data.employee.role.slice(1);
                    document.getElementById('employeeAvatar').textContent =
                        data.employee.full_name.charAt(0).toUpperCase();
                    window.currentEmployee = data.employee;
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('status'))   document.getElementById('filterStatus').value   = params.get('status');
                    if (params.get('priority')) document.getElementById('filterPriority').value = params.get('priority');
                    if (params.get('category')) document.getElementById('filterCategory').value = params.get('category');
                    if (params.get('search'))   document.getElementById('filterSearch').value   = params.get('search');
                    loadTickets();
                }
            } catch (e) { window.location.href = '/admin/login'; }
        }

        async function loadTickets(page = 1) {
            currentPage = page;
            const status   = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const category = document.getElementById('filterCategory').value;
            const search   = document.getElementById('filterSearch').value;

            let url = `/admin/api/tickets?page=${page}&per_page=${perPage}`;
            if (status)   url += `&status=${status}`;
            if (priority) url += `&priority=${priority}`;
            if (category) url += `&category=${category}`;
            if (search)   url += `&search=${encodeURIComponent(search)}`;

            try {
                const res  = await fetch(url, { headers: getAuthHeaders() });
                const data = await res.json();
                renderTickets(data.tickets || []);
                renderPagination(data.total || 0, data.page || 1, data.pages || 1);
            } catch (e) { console.error('Error loading tickets:', e); }
        }

        function renderTickets(tickets) {
            const tbody = document.getElementById('ticketsBody');
            if (!tickets.length) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="bi bi-inbox"></i><p>No tickets found</p></div></td></tr>`;
                return;
            }
            tbody.innerHTML = tickets.map(t => `
                <tr onclick="window.location.href='/admin/tickets/${t.id}'">
                    <td><span class="ticket-id">${escapeHtml(t.ticket_number)}</span></td>
                    <td>
                        <div class="cell-primary">${escapeHtml(t.customer_name || 'Unknown')}</div>
                        <div class="cell-secondary">${escapeHtml(t.customer_email || '')}</div>
                    </td>
                    <td style="max-width:220px">
                        <span class="truncate" style="display:block;font-size:.875rem">
                            ${escapeHtml(t.subject.substring(0, 50))}${t.subject.length > 50 ? '…' : ''}
                        </span>
                    </td>
                    <td><span class="pill pill-medium" style="text-transform:capitalize">${formatCategory(t.category)}</span></td>
                    <td><span class="pill pill-${t.priority}"><span class="pill-dot"></span>${t.priority}</span></td>
                    <td><span class="pill pill-${t.status.replace(/_/g,'-')}"><span class="pill-dot"></span>${formatStatus(t.status)}</span></td>
                    <td style="font-size:.82rem;color:var(--text-secondary)">${escapeHtml(t.assigned_to_name || 'Unassigned')}</td>
                    <td style="font-size:.78rem;color:var(--text-secondary);white-space:nowrap">${formatDate(t.created_at)}</td>
                </tr>
            `).join('');
        }

        function renderPagination(total, page, pages) {
            const nav = document.getElementById('paginationNav');
            const pagi = document.getElementById('pagination');
            if (pages <= 1) { nav.style.display = 'none'; return; }
            nav.style.display = '';
            let html = `<button class="pagi-btn ${page === 1 ? 'disabled' : ''}" onclick="loadTickets(${page - 1})">‹ Prev</button>`;
            for (let i = 1; i <= pages; i++) {
                if (i === 1 || i === pages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="pagi-btn ${i === page ? 'active' : ''}" onclick="loadTickets(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += '<span class="pagi-btn disabled" style="pointer-events:none">…</span>';
                }
            }
            html += `<button class="pagi-btn ${page === pages ? 'disabled' : ''}" onclick="loadTickets(${page + 1})">Next ›</button>`;
            pagi.innerHTML = html;
        }

        function formatStatus(s)  { return s.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()); }
        function formatCategory(c) { return (c || '').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()); }
        function formatDate(str) {
            if (!str) return '—';
            const d = new Date(str), now = new Date(), diff = now - d;
            if (diff < 60000)    return 'Just now';
            if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            return d.toLocaleDateString();
        }
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }
        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('user');
            window.location.href = '/admin/login';
            try { navigator.sendBeacon('/admin/api/logout'); } catch(e) {}
        }

        document.getElementById('filterSearch').addEventListener('keypress', e => {
            if (e.key === 'Enter') loadTickets();
        });

        checkAuth();
    </script>
</body>
</html>
