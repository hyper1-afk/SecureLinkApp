<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers — SecureLink Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-inner">
                <div class="sidebar-brand-icon"><img src="/static/icons/icon128.png" alt="SecureLink" style="width:32px;height:32px;display:block;border-radius:8px;"></div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-brand-name">SecureLink</span>
                    <span class="sidebar-brand-sub">Admin</span>
                </div>
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">Overview</div>
            <a href="/admin/dashboard" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">Support</div>
            <a href="/admin/tickets" class="nav-link"><i class="bi bi-ticket-detailed-fill"></i> All Tickets</a>
            <a href="/admin/tickets?status=open" class="nav-link"><i class="bi bi-inbox-fill"></i> Open</a>
            <a href="/admin/tickets?status=in_progress" class="nav-link"><i class="bi bi-clock-history"></i> In Progress</a>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">Management</div>
            <a href="/admin/customers" class="nav-link active"><i class="bi bi-people-fill"></i> Customers</a>
            <a href="/admin/employees" class="nav-link"><i class="bi bi-person-badge-fill"></i> Employees</a>
            <a href="/admin/licenses" class="nav-link"><i class="bi bi-key-fill"></i> Licenses</a>
        </div>

        <div class="nav-group">
            <div class="nav-group-label">System</div>
            <a href="/admin/database" class="nav-link"><i class="bi bi-database-fill"></i> Database</a>
        </div>

        <div class="sidebar-footer">
            <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="mobile-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="page-title">Customers</h1>
            </div>
            <div class="topbar-right">
                <span class="topbar-time" id="currentTime"></span>
                <div class="user-pill">
                    <div class="user-pill-avatar" id="employeeAvatar">?</div>
                    <div class="user-pill-info">
                        <div class="user-pill-name" id="employeeName">Loading…</div>
                        <div class="user-pill-role" id="employeeRole">—</div>
                    </div>
                </div>
                <a href="#" class="topbar-signout" onclick="logout()" title="Sign Out">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </div>

        <!-- Search -->
        <div class="filter-bar">
            <input type="text" class="form-control" id="searchInput" placeholder="Search by name or email…"
                style="min-width:280px">
            <button class="btn btn-primary" onclick="loadCustomers()">
                <i class="bi bi-search"></i> Search
            </button>
        </div>

        <!-- Table -->
        <div class="panel">
            <div class="panel-header">
                <h5 class="panel-title"><i class="bi bi-people-fill"></i> All Customers</h5>
                <span style="font-size:.82rem;color:var(--text-muted)" id="totalCount">0 customers</span>
            </div>
            <div style="overflow-x:auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Links Scanned</th>
                            <th>Email Accounts</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersBody">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <i class="bi bi-arrow-repeat"></i>
                                    <p>Loading customers…</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div id="paginationNav" style="display:none;">
            <div class="pagi" id="pagination"></div>
        </div>
    </main>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <script>
        let currentPage = 1;
        const perPage   = 20;

        function getAdminToken()  { return localStorage.getItem('admin_token'); }
        function getAuthHeaders() { return { 'Authorization': `Bearer ${getAdminToken()}` }; }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const open = sidebar.classList.toggle('open');
            overlay.classList.toggle('active', open);
        }

        function updateClock() {
            const el = document.getElementById('currentTime');
            if (el) el.textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }
        updateClock(); setInterval(updateClock, 30000);

        async function checkAuth() {
            const token = getAdminToken();
            if (!token) { window.location.href = '/admin/login'; return; }
            try {
                const res  = await fetch('/admin/api/validate', { headers: getAuthHeaders() });
                if (!res.ok) { localStorage.removeItem('admin_token'); window.location.href = '/admin/login'; return; }
                const data = await res.json();
                if (data.valid && data.employee) {
                    document.getElementById('employeeName').textContent = data.employee.full_name;
                    document.getElementById('employeeRole').textContent =
                        data.employee.role.charAt(0).toUpperCase() + data.employee.role.slice(1);
                    document.getElementById('employeeAvatar').textContent =
                        data.employee.full_name.charAt(0).toUpperCase();
                    window.currentEmployee = data.employee;
                    loadCustomers();
                }
            } catch (e) { window.location.href = '/admin/login'; }
        }

        async function loadCustomers(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            let url = `/admin/api/customers?page=${page}&per_page=${perPage}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            try {
                const res  = await fetch(url, { headers: getAuthHeaders() });
                const data = await res.json();
                document.getElementById('totalCount').textContent = `${data.total || 0} customers`;
                renderCustomers(data.customers || []);
                renderPagination(data.total || 0, data.page || 1, data.total_pages || 1);
            } catch (e) { console.error('Error loading customers:', e); }
        }

        function renderCustomers(customers) {
            const tbody = document.getElementById('customersBody');
            if (!customers.length) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="bi bi-people"></i><p>No customers found</p></div></td></tr>`;
                return;
            }
            tbody.innerHTML = customers.map(c => {
                const initChar = (c.full_name || c.username || c.email).charAt(0).toUpperCase();
                const tier = (c.subscription_tier || 'free').toLowerCase();
                return `
                    <tr>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px">
                                <div class="avatar avatar-md">${escapeHtml(initChar)}</div>
                                <div>
                                    <div class="cell-primary">${escapeHtml(c.full_name || c.username || 'N/A')}</div>
                                    <div class="cell-secondary">@${escapeHtml(c.username || 'N/A')}</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-size:.875rem">${escapeHtml(c.email)}</td>
                        <td><span class="pill pill-${tier}">${tier.toUpperCase()}</span></td>
                        <td style="font-size:.875rem">${c.links_verified_today || 0} today</td>
                        <td style="font-size:.875rem">${c.email_accounts_count || 0}</td>
                        <td style="font-size:.78rem;color:var(--text-secondary)">${formatDate(c.created_at)}</td>
                        <td>
                            <div style="display:flex;gap:6px">
                                <button class="btn btn-secondary btn-sm" onclick="viewCustomerTickets('${escapeHtml(c.email)}')" title="View Tickets">
                                    <i class="bi bi-ticket-detailed"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="confirmDeleteCustomer(${c.id}, '${escapeHtml(c.email)}')" title="Delete Customer">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination(total, page, pages) {
            const nav  = document.getElementById('paginationNav');
            const pagi = document.getElementById('pagination');
            if (pages <= 1) { nav.style.display = 'none'; return; }
            nav.style.display = '';
            let html = `<button class="pagi-btn ${page === 1 ? 'disabled' : ''}" onclick="loadCustomers(${page - 1})">‹ Prev</button>`;
            for (let i = 1; i <= pages; i++) {
                if (i === 1 || i === pages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="pagi-btn ${i === page ? 'active' : ''}" onclick="loadCustomers(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += '<span class="pagi-btn disabled">…</span>';
                }
            }
            html += `<button class="pagi-btn ${page === pages ? 'disabled' : ''}" onclick="loadCustomers(${page + 1})">Next ›</button>`;
            pagi.innerHTML = html;
        }

        function viewCustomerTickets(email) {
            window.location.href = `/admin/tickets?search=${encodeURIComponent(email)}`;
        }

        function confirmDeleteCustomer(userId, email) {
            if (!confirm(`Delete account: ${email}?\n\nThis action cannot be undone.`)) return;
            const input = prompt('Type DELETE to confirm:');
            if (input === 'DELETE') {
                deleteCustomer(userId, email);
            } else if (input !== null) {
                alert('Deletion cancelled. You must type DELETE to confirm.');
            }
        }

        async function deleteCustomer(userId, email) {
            try {
                const res  = await fetch(`/admin/api/customers/${userId}`, {
                    method: 'DELETE', headers: getAuthHeaders()
                });
                const data = await res.json();
                if (data.success) {
                    alert(`Customer ${email} has been deleted.`);
                    loadCustomers(currentPage);
                } else {
                    alert('Error deleting customer: ' + (data.error || 'Unknown error'));
                }
            } catch (e) { alert('Error deleting customer. Please try again.'); }
        }

        function formatDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }
        function logout() {
            fetch('/admin/api/logout', { method: 'POST', headers: getAuthHeaders() })
                .finally(() => { localStorage.removeItem('admin_token'); window.location.href = '/admin/login'; });
        }

        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') loadCustomers();
        });

        checkAuth();
    </script>
</body>
</html>
